<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hex Grid Board Game - Refined System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #12161a;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }
        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #818cf8;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.2s ease;
            outline: none;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
        .btn:active {
            transform: translateY(1px);
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1e2530 0%, #0f1319 100%);
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <h1>Hex Grid System</h1>
        <button class="btn" id="regenerate-btn">ステージ再生成</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const regenerateBtn = document.getElementById('regenerate-btn');

        let hexRadius = 38;       
        let hexGrid = new Map();  
        let hoveredKey = null;    
        let activeEffects = [];   

        let scaleFactor = 1;
        let offsetX = 0;
        let offsetY = 0;

        const SQRT_3 = Math.sqrt(3);

        // --- タイルクラス ---
        class Tile {
            constructor(q, r, isIsland = false) {
                this.q = q; 
                this.r = r; 
                this.isIsland = isIsland; 
                this.relX = hexRadius * (SQRT_3 * q + SQRT_3 / 2 * r);
                this.relY = hexRadius * (3 / 2 * r);
                
                this.hoverProgress = 0; 
            }

            getCenterPos() {
                return {
                    x: this.relX * scaleFactor + offsetX,
                    y: this.relY * scaleFactor + offsetY
                };
            }
        }

        // --- エフェクトクラス（波紋） ---
        class ClickEffect {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.maxRadius = hexRadius * scaleFactor * 1.6;
                this.alpha = 1;
                this.isDead = false;
            }
            update() {
                this.radius += (this.maxRadius - this.radius) * 0.15;
                this.alpha += (0 - this.alpha) * 0.1;
                if (this.alpha < 0.01) this.isDead = true;
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = `rgba(165, 180, 252, ${this.alpha})`;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#a5b4fc';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- グリッド生成アルゴリズム ---
        function generateOrganicHexGrid() {
            hexGrid.clear();
            hoveredKey = null;
            activeEffects = [];

            const totalTargetSize = Math.floor(Math.random() * 71) + 30; 
            const hasIslands = Math.random() < 0.7 && totalTargetSize > 40;
            
            let islandTargetSize = 0;
            let mainTargetSize = totalTargetSize;

            if (hasIslands) {
                islandTargetSize = Math.floor(totalTargetSize * (Math.random() * 0.15 + 0.1));
                mainTargetSize = totalTargetSize - islandTargetSize;
            }

            const directions = [
                {q: 1, r: 0}, {q: 1, r: -1}, {q: 0, r: -1},
                {q: -1, r: 0}, {q: -1, r: 1}, {q: 0, r: 1}
            ];

            function generateCluster(startQ, startR, targetSize, isIsland) {
                let clusterAdded = 0;
                let frontier = [];
                const localGrid = new Map();

                const startKey = `${startQ},${startR}`;
                if (!hexGrid.has(startKey)) {
                    const newTile = new Tile(startQ, startR, isIsland);
                    hexGrid.set(startKey, newTile);
                    localGrid.set(startKey, newTile);
                    clusterAdded++;
                }

                function addFrontier(q, r) {
                    directions.forEach(d => {
                        const nq = q + d.q;
                        const nr = r + d.r;
                        const key = `${nq},${nr}`;
                        if (!hexGrid.has(key) && !frontier.some(f => f.key === key)) {
                            frontier.push({q: nq, r: nr, key: key});
                        }
                    });
                }

                addFrontier(startQ, startR);

                while (clusterAdded < targetSize && frontier.length > 0) {
                    const index = Math.floor(Math.random() * frontier.length);
                    const candidate = frontier.splice(index, 1)[0];

                    if (!hexGrid.has(candidate.key)) {
                        const newTile = new Tile(candidate.q, candidate.r, isIsland);
                        hexGrid.set(candidate.key, newTile);
                        localGrid.set(candidate.key, newTile);
                        clusterAdded++;
                        addFrontier(candidate.q, candidate.r);
                    }
                }
                return localGrid;
            }

            // メイン陸地を生成
            const mainCluster = generateCluster(0, 0, mainTargetSize, false);

            // 離島の生成処理（メイン陸地から最大8マス以内の距離制限付き）
            if (islandTargetSize > 0) {
                const mainTileCoords = Array.from(mainCluster.values());
                const numIslands = Math.floor(Math.random() * 2) + 1; 
                let remainingIslandTiles = islandTargetSize;

                for (let i = 0; i < numIslands; i++) {
                    if (remainingIslandTiles <= 0) break;
                    
                    const currentIslandSize = (i === numIslands - 1) ? remainingIslandTiles : Math.floor(remainingIslandTiles / (numIslands - i));
                    remainingIslandTiles -= currentIslandSize;

                    let validSpawnFound = false;
                    let startQ = 0, startR = 0;
                    
                    for (let attempts = 0; attempts < 100; attempts++) {
                        const baseTile = mainTileCoords[Math.floor(Math.random() * mainTileCoords.length)];
                        const dist = Math.floor(Math.random() * 4) + 4; 
                        const angleDir = Math.floor(Math.random() * 6);
                        
                        const dir = directions[angleDir];
                        const sideDir = directions[(angleDir + 2) % 6];
                        
                        const testQ = baseTile.q + dir.q * dist + sideDir.q * Math.floor(Math.random() * 2);
                        const testR = baseTile.r + dir.r * dist + sideDir.r * Math.floor(Math.random() * 2);
                        
                        const key = `${testQ},${testR}`;
                        
                        if (!hexGrid.has(key)) {
                            startQ = testQ;
                            startR = testR;
                            validSpawnFound = true;
                            break;
                        }
                    }

                    if (validSpawnFound) {
                        generateCluster(startQ, startR, currentIslandSize, true);
                    }
                }
            }

            autoScaleAndCenter();
        }

        // --- オートスケーリング・画面中央揃え ---
        function autoScaleAndCenter() {
            if (hexGrid.size === 0) return;

            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);

            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;

            hexGrid.forEach(tile => {
                if (tile.relX < minX) minX = tile.relX;
                if (tile.relX > maxX) maxX = tile.relX;
                if (tile.relY < minY) minY = tile.relY;
                if (tile.relY > maxY) maxY = tile.relY;
            });

            const gridWidth = (maxX - minX) + hexRadius * SQRT_3 * 2;
            const gridHeight = (maxY - minY) + hexRadius * 3;

            const margin = 60; 
            const scaleX = (window.innerWidth - margin) / gridWidth;
            const scaleY = (window.innerHeight - margin - 100) / gridHeight; 
            scaleFactor = Math.min(scaleX, scaleY, 1.1); 

            const gridCenterX = minX + (maxX - minX) / 2;
            const gridCenterY = minY + (maxY - minY) / 2;

            offsetX = window.innerWidth / 2 - gridCenterX * scaleFactor;
            offsetY = window.innerHeight / 2 - gridCenterY * scaleFactor + 25; 
        }

        function drawHexagonPath(x, y, radius) {
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i + Math.PI / 6;
                ctx.lineTo(x + radius * Math.cos(angle), y + radius * Math.sin(angle));
            }
            ctx.closePath();
        }

        // --- 描画メインループ ---
        function draw() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            hexGrid.forEach((tile, key) => {
                const center = tile.getCenterPos();
                const currentRadius = hexRadius * scaleFactor;

                // ホバーのアニメーション
                if (key === hoveredKey) {
                    tile.hoverProgress += (1 - tile.hoverProgress) * 0.2;
                } else {
                    tile.hoverProgress += (0 - tile.hoverProgress) * 0.15;
                }

                const lift = tile.hoverProgress * 5; 
                const drawX = center.x;
                const drawY = center.y - lift;

                ctx.save();

                // タイルの影
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 10 + tile.hoverProgress * 8;
                ctx.shadowOffsetY = 5 + tile.hoverProgress * 3;

                // 【修正】タップ状態による色の変化を完全に廃止し、通常色で統一
                const grad = ctx.createLinearGradient(drawX, drawY - currentRadius, drawX, drawY + currentRadius);
                grad.addColorStop(0, '#2e3748');
                grad.addColorStop(1, '#1a202c');
                ctx.fillStyle = grad;

                drawHexagonPath(drawX, drawY, currentRadius - 1.5);
                ctx.fill();

                // 影をリセットして枠線を描画
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                if (key === hoveredKey) {
                    // ホバー時は枠線が明るく発光
                    ctx.strokeStyle = '#a5b4fc';
                    ctx.lineWidth = 2.5;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#a5b4fc';
                } else {
                    // 通常時の枠線
                    ctx.strokeStyle = '#3f4b61';
                    ctx.lineWidth = 1.5;
                }
                ctx.stroke();
                ctx.restore();
            });

            // エフェクト（波紋）の描画
            for (let i = activeEffects.length - 1; i >= 0; i--) {
                const fx = activeEffects[i];
                fx.update();
                fx.draw();
                if (fx.isDead) activeEffects.splice(i, 1);
            }

            requestAnimationFrame(draw);
        }

        function getTileAtPosition(screenX, screenY) {
            let closestKey = null;
            let minDistance = Infinity;
            const currentRadius = hexRadius * scaleFactor;

            hexGrid.forEach((tile, key) => {
                const center = tile.getCenterPos();
                const dx = screenX - center.x;
                const dy = screenY - center.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < currentRadius * (SQRT_3 / 2) && dist < minDistance) {
                    minDistance = dist;
                    closestKey = key;
                }
            });

            return closestKey;
        }

        function handleMove(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            hoveredKey = getTileAtPosition(x, y);
        }

        function handleAction(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            const clickedKey = getTileAtPosition(x, y);

            if (clickedKey) {
                // 【修正】selectedKeyによる状態変更の判定を削除
                const center = hexGrid.get(clickedKey).getCenterPos();
                activeEffects.push(new ClickEffect(center.x, center.y));
            }
        }

        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mousedown', handleAction);
        canvas.addEventListener('touchmove', handleMove, { passive: true });
        canvas.addEventListener('touchstart', handleMove, { passive: true });
        canvas.addEventListener('touchend', handleAction);

        window.addEventListener('resize', autoScaleAndCenter);
        regenerateBtn.addEventListener('click', generateOrganicHexGrid);

        // 初回起動
        generateOrganicHexGrid();
        draw();

    </script>
</body>
</html>
